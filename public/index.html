<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent Skills 数据可视化入口</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #172033;
      background: radial-gradient(circle at top left, rgba(88, 166, 255, 0.28), transparent 34%), linear-gradient(135deg, #f7fbff 0%, #edf4ff 48%, #f8fbff 100%);
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      padding: 48px;
      border: 1px solid rgba(91, 122, 168, 0.18);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 24px 70px rgba(43, 78, 128, 0.16);
      backdrop-filter: blur(14px);
      text-align: center;
    }

    .tag {
      display: inline-flex;
      padding: 8px 14px;
      margin-bottom: 22px;
      border-radius: 999px;
      background: #eaf3ff;
      color: #2563eb;
      font-weight: 700;
      font-size: 14px;
    }

    h1 {
      font-size: clamp(32px, 5vw, 52px);
      line-height: 1.12;
      margin-bottom: 18px;
      letter-spacing: -0.04em;
    }

    p {
      color: #5f6f89;
      font-size: 18px;
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 14px 22px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 800;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    a:hover { transform: translateY(-2px); }

    .primary {
      color: white;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.25);
    }

    .secondary {
      color: #2563eb;
      background: #eef5ff;
      border: 1px solid #d9e8ff;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="tag">数据可视化作业入口</div>
    <h1>AI Agent Skills 数据可视化</h1>
    <p>
      本项目从 VoltAgent/awesome-agent-skills 爬取技能列表数据，
      只保存 JSON 数据，不下载 skill 文件夹。后续可在这里接入可视化大屏或分析页面。
    </p>
    <div class="actions">
      <a class="primary" href="visualization.html">进入可视化页面</a>
      <a class="secondary" href="../data/skills_summary.json">查看数据摘要</a>
      <a class="secondary" href="https://github.com/sunpu24/agent-skill-shop" target="_blank" rel="noreferrer">⭐ GitHub 仓库</a>
    </div>
  </main>
</body>
</html>
